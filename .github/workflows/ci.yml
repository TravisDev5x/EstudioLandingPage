name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    # Valores ficticios solo para que `prisma generate` y `next build`
    # puedan ejecutarse sin necesitar credenciales reales.
    env:
      DATABASE_URL: "mysql://user:pass@localhost:3306/db"
      AUTH_SECRET: "ci-build-placeholder-secret"
      AUTH_URL: "http://localhost:3000"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
